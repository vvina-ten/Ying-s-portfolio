<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AR 体验 — Suspended Assembly</title>
<style>
  html, body { margin: 0; min-height: 100%; background: #09030f; color: #f4f1ff; font-family: 'Inter', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; }
  #ar-root { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  #message { position: absolute; left: 50%; top: 24px; transform: translateX(-50%); z-index: 10; text-align: center; width: min(420px, calc(100vw - 40px)); }
  #message h1 { margin: 0; font-size: 18px; letter-spacing: 0.1em; text-transform: uppercase; color: #c9b8ff; }
  #message p { margin: 8px 0 0; font-size: 13px; color: rgba(244,241,255,0.82); line-height: 1.6; }
  #enter-ar { position: absolute; left: 50%; bottom: 24px; transform: translateX(-50%); z-index: 10; padding: 12px 24px; border: none; border-radius: 999px; background: rgba(139,107,255,0.95); color: white; font-size: 14px; cursor: pointer; }
  #enter-ar:disabled { opacity: 0.55; cursor: not-allowed; }
  #ar-overlay { position: absolute; inset: 0; background: rgba(4,1,10,0.36); pointer-events: none; }
</style>
</head>
<body>
<div id="ar-root"></div>
<div id="message">
  <h1>Web AR / AR 体验</h1>
  <p>请在支持 WebXR 的手机浏览器中打开此页面。若出现提示，请授权摄像头权限并点击按钮进入 AR 模式。</p>
</div>
<button id="enter-ar">检测 WebXR...</button>
<div id="ar-overlay"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js"></script>
<script>
  const container = document.getElementById('ar-root');
  const button = document.getElementById('enter-ar');

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const light = new THREE.HemisphereLight(0xffffff, 0x222233, 1);
  scene.add(light);
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
  dirLight.position.set(0.5, 1, 0.3);
  scene.add(dirLight);

  const reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.1, 0.14, 32).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.9, transparent: true })
  );
  reticle.visible = false;
  scene.add(reticle);

  let model = null;
  const loader = new THREE.GLTFLoader();
  loader.load('../web/model.glb', (gltf) => {
    model = gltf.scene;
    model.scale.setScalar(0.35);
    model.position.set(0, 0, 0);
  });

  const controller = renderer.xr.getController(0);
  scene.add(controller);

  const hitTestSourceRequested = false;
  let hitTestSource = null;
  let localSpace = null;

  function onSessionStart(session) {
    renderer.xr.setSession(session);
    session.requestReferenceSpace('viewer').then((refSpace) => {
      session.requestHitTestSource({ space: refSpace }).then((source) => {
        hitTestSource = source;
      });
    });
    session.requestReferenceSpace('local').then((refSpace) => {
      localSpace = refSpace;
    });
    session.addEventListener('end', () => {
      hitTestSource = null;
      localSpace = null;
    });
  }

  function animate(timestamp, frame) {
    renderer.setAnimationLoop(animate);
    if (frame && hitTestSource && localSpace) {
      const referenceSpace = localSpace;
      const hitTestResults = frame.getHitTestResults(hitTestSource);
      if (hitTestResults.length) {
        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);
        reticle.visible = true;
        reticle.position.set(pose.transform.position.x, pose.transform.position.y, pose.transform.position.z);
        reticle.updateMatrixWorld(true);
      }
    }
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  const isMobileDevice = /Mobi|Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  const messageText = document.querySelector('#message p');

  if (!isMobileDevice) {
    button.textContent = '请使用手机扫码访问';
    button.disabled = true;
    messageText.textContent = '该 AR 页面仅限手机访问。请使用手机扫描二维码或直接从手机打开此页面。';
  } else {
    button.textContent = '进入 AR';
    button.disabled = false;
  }

  button.addEventListener('click', () => {
    if (!isMobileDevice) return;
    if (navigator.xr) {
      navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
        if (supported) {
          navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['hit-test', 'local-floor'] }).then(onSessionStart);
        } else {
          alert('当前手机浏览器不支持 WebXR AR。请更换支持 AR 的浏览器后再试。');
        }
      }).catch(() => {
        alert('当前手机浏览器无法启动 WebXR AR。请尝试 Chrome 或 Safari 等支持设备。');
      });
    } else {
      alert('未检测到 WebXR 支持。请在支持 AR 的手机浏览器中打开此页面。');
    }
  });

  animate();
</script>
</body>
</html>
