<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AR Experience — Suspended Assembly</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<style>
  :root {
    --bg-1: #0a0a1a;
    --bg-2: #2a1a4a;
    --bg-3: #4a2f7a;
    --accent: #8b6bff;
    --accent-2: #ff8fd6;
    --text-hi: #f4f1ff;
    --text-lo: rgba(244,241,255,0.6);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
    color: var(--text-hi);
    font-family: 'Inter', Arial, Helvetica, sans-serif;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    gap: 16px;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text-lo);
  }
  h1 {
    font-size: 20px;
    margin: 4px 0 0;
    font-weight: 600;
    text-shadow: 0 0 20px rgba(139,107,255,0.5);
  }
  .viewer-wrap {
    position: relative;
    width: 100%;
    max-width: 920px;
    height: 62vh;
  }
  model-viewer {
    width: 100%;
    height: 100%;
    border-radius: 18px;
    overflow: hidden;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.15);
    --poster-color: transparent;
  }
  #load-status {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--text-lo);
    letter-spacing: 0.05em;
    pointer-events: none;
    background: rgba(10,10,26,0.35);
    border-radius: 18px;
  }
  #load-status.hidden { display: none; }
  #btn {
    padding: 14px 30px;
    font-size: 15px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: #fff;
    border: none;
    border-radius: 999px;
    cursor: pointer;
  }
  #btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #note {
    font-size: 13px;
    color: var(--text-lo);
    text-align: center;
    max-width: 420px;
    line-height: 1.6;
  }
  #back {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10;
    color: var(--text-hi);
    text-decoration: none;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
  }
</style>
</head>
<body>

<a id="back" href="../">← Back to Home</a>

<div class="wrap">
  <div style="text-align:center;">
    <div class="eyebrow">Suspended Assembly</div>
    <h1>AR View</h1>
  </div>

  <div class="viewer-wrap">
    <model-viewer id="viewer"
      src="../web/model.glb"
      ios-src="./kn0_w3r.usdz"
      alt="Suspended Assembly"
      ar
      ar-modes="quick-look scene-viewer webxr"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      environment-image="neutral"
      exposure="1">
    </model-viewer>
    <div id="load-status">Loading model… 0%</div>
  </div>

  <button id="btn">Enter AR</button>
  <div id="note">Open this page in a mobile browser: on iPhone, Safari launches AR via Quick Look; on Android, Chrome uses Scene Viewer or WebXR. On desktop you can only view the 3D model — AR isn't available.</div>
</div>

<script>
  const btn = document.getElementById('btn');
  const viewer = document.getElementById('viewer');
  const note = document.getElementById('note');
  const loadStatus = document.getElementById('load-status');

  viewer.addEventListener('progress', (e) => {
    const pct = Math.round(e.detail.totalProgress * 100);
    loadStatus.textContent = `Loading model… ${pct}%`;
    if (viewer.loaded) loadStatus.classList.add('hidden');
  });
  viewer.addEventListener('load', () => {
    loadStatus.classList.add('hidden');
  });
  viewer.addEventListener('error', (e) => {
    loadStatus.textContent = 'Failed to load model — check your connection and refresh';
    console.error('model-viewer load error', e.detail);
  });
  const loadedCheck = setInterval(() => {
    if (viewer.loaded) {
      loadStatus.classList.add('hidden');
      clearInterval(loadedCheck);
    }
  }, 300);

  const isMobile = /Mobi|Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  if (!isMobile) {
    btn.textContent = 'Please open this page on your phone to experience AR';
    btn.disabled = true;
  }

  btn.addEventListener('click', () => {
    if (!isMobile) return;
    viewer.activateAR().catch((err) => {
      console.warn('AR entry failed', err);
      note.textContent = "This browser can't launch AR directly. Make sure you're using Safari (iOS) or Chrome (Android), then try again.";
    });
  });
</script>

</body>
</html>
