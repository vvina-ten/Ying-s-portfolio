<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR — Model Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    html,body{height:100%;margin:0;background:#07030b;color:#fff;font-family:Inter,Arial,Helvetica,sans-serif}
    .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:18px;box-sizing:border-box}
    model-viewer{width:100%;max-width:920px;height:70vh;border-radius:12px;overflow:hidden;background:#000;display:block}
    #btn{padding:14px 30px;font-size:16px;background:linear-gradient(90deg,#8b6bff,#ff8fd6);color:#fff;border:none;border-radius:12px;cursor:pointer;margin-top:16px}
    #note{font-size:13px;color:rgba(255,255,255,0.82);margin-top:12px;text-align:center}
    @media(min-width:900px){model-viewer{height:60vh}}
  </style>
</head>
<body>
  <div class="wrap">
    <model-viewer id="viewer"
      src="../web/model.glb"
      ios-src="./kn0_w3r.usdz"
      alt="Suspended Assembly"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      environment-image="neutral"
      exposure="1">
    </model-viewer>

    <button id="btn">在手机上打开 AR（仅限手机）</button>
    <div id="note">若为手机访问，点击按钮或长按二维码可直接打开 AR；若在桌面，请用手机扫码返回页面。</div>
  </div>

  <script>
    const btn = document.getElementById('btn');
    const viewer = document.getElementById('viewer');

    const isMobile = /Mobi|Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    if (!isMobile) {
      btn.textContent = '请使用手机扫码或打开本页以体验 AR';
      btn.disabled = true;
    }

    btn.addEventListener('click', async () => {
      if (!isMobile) return;
      // model-viewer will show AR UI when available; `enterAR()` may be available in some builds
      try {
        if (viewer.showPoster) viewer.showPoster = false;
        if (typeof viewer.enterAR === 'function') {
          await viewer.enterAR();
        } else {
          // fallback: focus element so user can tap the AR icon
          viewer.scrollIntoView({behavior:'smooth',block:'center'});
        }
      } catch (e) {
        console.warn('AR entry failed', e);
        alert('无法直接打开 AR，请在支持的手机浏览器中尝试扫描二维码。');
      }
    });
  </script>
</body>
</html>
